name: Build Matrix

on:
  push:
    branches: ["master"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SBCL
        run: sudo apt-get update && sudo apt-get install -y sbcl

      - name: Install OCICL
        shell: bash
        run: |
          git clone https://github.com/ocicl/ocicl.git "$RUNNER_TEMP/ocicl"
          pushd "$RUNNER_TEMP/ocicl"
          sbcl --non-interactive --load setup.lisp
          popd
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install test dependencies
        run: |
          OCICL_LOCAL_ONLY=1 ocicl install
          OCICL_LOCAL_ONLY=1 ocicl install rove

      - name: Run tests
        shell: bash
        run: |
          sbcl --non-interactive \
            --eval '(require :asdf)' \
            --eval "(asdf:initialize-source-registry (list :source-registry :inherit-configuration (list :tree \"${GITHUB_WORKSPACE}/ocicl\")))" \
            --eval "(asdf:load-asd \"${GITHUB_WORKSPACE}/altera-launcher.asd\")" \
            --eval '(asdf:test-system :altera-launcher/tests)'

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SBCL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y sbcl

      - name: Install SBCL (macOS)
        if: runner.os == 'macOS'
        run: brew install sbcl

      - name: Install OCICL (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          git clone https://github.com/ocicl/ocicl.git "$RUNNER_TEMP/ocicl"
          pushd "$RUNNER_TEMP/ocicl"
          sbcl --non-interactive --load setup.lisp
          popd
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install SBCL (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
          scoop install sbcl git
          git clone https://github.com/ocicl/ocicl.git "$env:TEMP\ocicl"
          $env:OCICL_REPO_DIR = "$env:TEMP\ocicl"
          sbcl --non-interactive --script scripts/bootstrap-ocicl-windows.lisp
          if ($LASTEXITCODE -ne 0) { throw "OCICL bootstrap script failed" }
          $ociclExe = Get-ChildItem -Path $env:USERPROFILE -Filter ocicl.exe -Recurse -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $ociclExe) { throw "Could not locate ocicl.exe under $env:USERPROFILE" }
          "OCICL_EXE=$ociclExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          (Split-Path -Parent $ociclExe) | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build artifact (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          OCICL_LOCAL_ONLY=1 ocicl install
          sbcl --script scripts/build-release-image.lisp

      - name: Build artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $env:OCICL_LOCAL_ONLY = "1"
          & "$env:OCICL_EXE" install
          sbcl --script scripts/build-release-image.lisp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: altera-launcher-${{ runner.os }}-${{ runner.arch }}
          path: dist/*
