name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (for example v0.1.0)
        required: true
      name:
        description: Release title
        required: true
      prerelease:
        description: Mark release as prerelease
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SBCL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y sbcl

      - name: Install SBCL (macOS)
        if: runner.os == 'macOS'
        run: brew install sbcl

      - name: Install OCICL (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          git clone https://github.com/ocicl/ocicl.git "$RUNNER_TEMP/ocicl"
          pushd "$RUNNER_TEMP/ocicl"
          sbcl --non-interactive --load setup.lisp
          popd
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install SBCL and OCICL (Windows via Scoop)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
          scoop install sbcl git
          git clone https://github.com/ocicl/ocicl.git "$env:TEMP\ocicl"
          Push-Location "$env:TEMP\ocicl"
          sbcl --non-interactive --load setup.lisp
          Pop-Location
          "$env:USERPROFILE\AppData\Local\ocicl" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build artifact (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          OCICL_LOCAL_ONLY=1 ocicl install
          sbcl --script scripts/build-release-image.lisp

      - name: Build artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $env:OCICL_LOCAL_ONLY = "1"
          & "$env:USERPROFILE\AppData\Local\ocicl\ocicl.exe" install
          sbcl --script scripts/build-release-image.lisp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: altera-launcher-${{ runner.os }}-${{ runner.arch }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: altera-launcher-*
          merge-multiple: true
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.name }}
          prerelease: ${{ inputs.prerelease == 'true' }}
          generate_release_notes: true
          files: dist/*
